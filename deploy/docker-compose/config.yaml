database:
  user: hanko
  password: hanko
  host: postgresd
  port: 5432
  dialect: postgres
email_delivery:
  smtp:
    host: "mailslurper"
    port: "2500"
  from_address: noreply@hanko.io
secrets:
  keys:
    - abcedfghijklmnopqrstuvwxyz
service:
  name: Hanko Authentication Service
webauthn:
  relying_party:
    origins:
      - "http://localhost:8888"
session:
  cookie:
    name: clinicos-2fa
    secure: false # is needed for safari, because safari does not store secure cookies on localhost
    same_site: lax
    http_only: true

rate_limiter:
  enabled: true
  store: in_memory
  passcode_limits:
    tokens: 3
    interval: 1m
  password_limits:
    tokens: 5
    interval: 1m
  token_limits:
    tokens: 3
    interval: 1m
  service_token_limits:
    tokens: 3
    interval: 1m

# username:
#   enabled: true
#   optional: true

# MFA configuration with device trust
mfa:
  enabled: true
  optional: true
  acquire_on_login: false
  acquire_on_registration: true
  device_trust_policy: "prompt"
  device_trust_duration: "720h"
  device_trust_cookie_name: "hanko-device-token"
  device_trust_max_users_per_device: 20
  totp:
    enabled: true
  security_keys:
    enabled: false
server:
  public:
    cors:
      allow_origins:
        - "http://localhost:8888"
security_notifications:
  notifications:
    email_create:
      enabled: true
    email_delete:
      enabled: true
    password_update:
      enabled: true
    passkey_create:
      enabled: true
    primary_email_update:
      enabled: true
    mfa_create:
      enabled: true
    mfa_delete:
      enabled: true


# Service token for pre-authenticated login flow
# Allows trusted backends to bypass password/passkey/OTP by providing a signed JWT
# service_token:
#   secret: "CHANGE_ME_IN_PRODUCTION"   # Shared HMAC secret with clinic-os-backend
#   issuer: "clinic-os-backend"                     # Expected JWT issuer (validated if set)

# Multi-tenant configuration
# Uncomment and configure to enable multi-tenant mode
# multi_tenant:
#   enabled: true                    # Enable multi-tenant mode (default: false)
#   tenant_header: "X-Tenant-ID"     # HTTP header for tenant ID (default: X-Tenant-ID)
#   allow_global_users: true         # Allow users without tenant - backward compatible (default: true)
#   auto_provision: true             # Auto-create tenant if ID doesn't exist (default: true)
